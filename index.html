<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrivChain — Private Payments for AI Agents</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080c12;
      --surface:   #0d1420;
      --surface2:  #121b2a;
      --border:    #1e2d42;
      --border2:   #243347;
      --accent:    #00d4ff;
      --accent2:   #7c3aed;
      --green:     #00e676;
      --yellow:    #ffd740;
      --red:       #ff5252;
      --muted:     #4a6080;
      --text:      #c8d8e8;
      --text2:     #8aa0b8;
      --glow:      0 0 20px rgba(0, 212, 255, 0.15);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    #root { position: relative; z-index: 1; }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ─── Animations ─── */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 8px rgba(0,212,255,0.2); }
      50%       { box-shadow: 0 0 24px rgba(0,212,255,0.5); }
    }
    @keyframes spinnerRing {
      to { transform: rotate(360deg); }
    }
    @keyframes scanline {
      0%   { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(6px) scale(0.96); }
      100% { opacity: 1; transform: translateY(0)  scale(1); }
    }
    @keyframes progressFill {
      from { width: 0%; }
      to   { width: 100%; }
    }
    @keyframes hexPulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }

    /* ─── Layout helpers ─── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ─── Header ─── */
    .header {
      border-bottom: 1px solid var(--border);
      background: rgba(8,12,18,0.9);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 16px rgba(0,212,255,0.3);
    }
    .logo-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .tagline {
      font-size: 13px;
      color: var(--text2);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.5px;
    }
    .header-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,212,255,0.06);
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
    }
    .dot-live {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 1.4s ease-in-out infinite;
    }

    /* ─── Hero ─── */
    .hero {
      text-align: center;
      padding: 60px 24px 40px;
    }
    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      color: #a78bfa;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
    }
    .hero h1 {
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 16px;
      letter-spacing: -1px;
    }
    .hero h1 span {
      background: linear-gradient(90deg, var(--accent) 0%, #a78bfa 50%, var(--accent) 100%);
      background-size: 200% auto;
      animation: shimmer 4s linear infinite;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero-sub {
      font-size: 17px;
      color: var(--text2);
      max-width: 560px;
      margin: 0 auto 40px;
      line-height: 1.6;
    }

    /* ─── Stats row ─── */
    .stats-row {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 56px;
      flex-wrap: wrap;
    }
    .stat {
      text-align: center;
    }
    .stat-val {
      font-size: 28px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
    }
    .stat-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    /* ─── Main demo grid ─── */
    .demo-grid {
      display: grid;
      grid-template-columns: 1fr 260px 1fr;
      gap: 20px;
      margin-bottom: 40px;
      align-items: start;
    }
    @media (max-width: 900px) {
      .demo-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ─── Agent Card ─── */
    .agent-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      transition: border-color 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }
    .agent-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.4s;
    }
    .agent-card.active::before { opacity: 1; }
    .agent-card.active {
      border-color: rgba(0,212,255,0.3);
      box-shadow: var(--glow);
      animation: pulseGlow 2s ease-in-out infinite;
    }
    .agent-card.seller-card::before {
      background: linear-gradient(90deg, transparent, var(--accent2), transparent);
    }
    .agent-card.seller-card.active {
      border-color: rgba(124,58,237,0.3);
      box-shadow: 0 0 20px rgba(124,58,237,0.15);
    }

    .agent-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .agent-avatar {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }
    .avatar-buyer {
      background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,212,255,0.05));
      border: 1px solid rgba(0,212,255,0.2);
    }
    .avatar-seller {
      background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(124,58,237,0.05));
      border: 1px solid rgba(124,58,237,0.2);
    }

    .agent-title {
      font-size: 16px;
      font-weight: 600;
      color: #e2eaf4;
      margin-bottom: 3px;
    }
    .agent-subtitle {
      font-size: 12px;
      color: var(--text2);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.3px;
      transition: all 0.3s;
    }
    .badge-idle {
      background: rgba(74,96,128,0.2);
      border: 1px solid rgba(74,96,128,0.4);
      color: var(--muted);
    }
    .badge-active {
      background: rgba(0,212,255,0.1);
      border: 1px solid rgba(0,212,255,0.3);
      color: var(--accent);
    }
    .badge-complete {
      background: rgba(0,230,118,0.1);
      border: 1px solid rgba(0,230,118,0.3);
      color: var(--green);
    }
    .badge-waiting {
      background: rgba(255,215,64,0.08);
      border: 1px solid rgba(255,215,64,0.25);
      color: var(--yellow);
    }
    .badge-verifying {
      background: rgba(124,58,237,0.12);
      border: 1px solid rgba(124,58,237,0.35);
      color: #a78bfa;
    }
    .badge-paid {
      background: rgba(0,230,118,0.1);
      border: 1px solid rgba(0,230,118,0.3);
      color: var(--green);
    }

    .agent-fields {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .field-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: 'JetBrains Mono', monospace;
    }
    .field-value {
      font-size: 13px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
    }
    .field-value.accent { color: var(--accent); font-weight: 600; }
    .field-value.accent2 { color: #a78bfa; font-weight: 600; }
    .field-value.large {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .wallet-addr {
      font-size: 11px;
      color: var(--text2);
      font-family: 'JetBrains Mono', monospace;
      word-break: break-all;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
    }

    /* ─── Flow Column ─── */
    .flow-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .flow-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .flow-header h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: 'JetBrains Mono', monospace;
    }

    .flow-pipe {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      gap: 0;
    }

    .flow-node {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--border2);
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      position: relative;
      transition: all 0.4s;
      flex-shrink: 0;
    }
    .flow-node.done {
      border-color: var(--accent);
      background: rgba(0,212,255,0.08);
      box-shadow: 0 0 12px rgba(0,212,255,0.3);
    }
    .flow-node.current {
      border-color: var(--accent);
      animation: pulseGlow 1.2s ease-in-out infinite;
    }

    .flow-line {
      width: 2px;
      height: 20px;
      background: var(--border);
      transition: background 0.4s;
      flex-shrink: 0;
    }
    .flow-line.lit {
      background: linear-gradient(180deg, var(--accent), rgba(0,212,255,0.3));
    }

    .privchain-badge {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 12px 16px;
      text-align: center;
      margin: 12px 0;
      width: 100%;
    }
    .privchain-badge .pb-title {
      font-size: 11px;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .privchain-badge .pb-sub {
      font-size: 10px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ─── Timeline ─── */
    .timeline-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 32px;
    }
    .timeline-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .timeline-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
    }
    .step-count {
      font-size: 12px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .progress-bar-wrap {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }

    .timeline-steps {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .step-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(30,45,66,0.5);
      opacity: 0;
      animation: none;
      position: relative;
    }
    .step-item:last-child { border-bottom: none; }
    .step-item.visible {
      animation: fadeSlideIn 0.45s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    .step-item.pending { opacity: 0.25; }

    .step-icon-wrap {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border2);
      transition: all 0.3s;
    }
    .step-item.visible .step-icon-wrap {
      background: rgba(0,212,255,0.06);
      border-color: rgba(0,212,255,0.2);
    }
    .step-item.current-step .step-icon-wrap {
      animation: pulseGlow 1.2s ease-in-out infinite;
    }

    .step-body { flex: 1; min-width: 0; }
    .step-title {
      font-size: 14px;
      font-weight: 500;
      color: #e2eaf4;
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .step-meta {
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .step-hash {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      background: rgba(0,212,255,0.05);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 4px;
      padding: 2px 6px;
      display: inline-block;
      margin-top: 4px;
      word-break: break-all;
    }
    .step-link {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px dashed rgba(0,212,255,0.4);
      transition: color 0.2s, border-color 0.2s;
    }
    .step-link:hover {
      color: #7dd3fc;
      border-color: #7dd3fc;
    }

    .step-time {
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .step-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0,212,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spinnerRing 0.8s linear infinite;
      display: inline-block;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* ─── Live Data Section ─── */
    .live-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 32px;
    }
    .live-section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .live-section-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }
    .live-section-header .live-tag {
      background: rgba(0,230,118,0.1);
      border: 1px solid rgba(0,230,118,0.3);
      color: var(--green);
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .try-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--accent), #38bdf8);
      color: #000;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      font-family: 'Inter', sans-serif;
      letter-spacing: -0.2px;
      box-shadow: 0 4px 20px rgba(0,212,255,0.3);
    }
    .try-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,212,255,0.4);
    }
    .try-btn:active:not(:disabled) { transform: translateY(0); }
    .try-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .reset-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--text2);
      font-size: 13px;
      font-weight: 500;
      padding: 12px 20px;
      border-radius: 10px;
      border: 1px solid var(--border2);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
      margin-left: 12px;
    }
    .reset-btn:hover { border-color: var(--text2); color: var(--text); }

    .btn-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0;
      margin-bottom: 24px;
    }

    .data-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    .data-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      animation: floatUp 0.4s ease forwards;
    }
    .data-card-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 6px;
    }
    .data-card-value {
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      word-break: break-all;
      line-height: 1.5;
    }

    .error-box {
      background: rgba(255,82,82,0.06);
      border: 1px solid rgba(255,82,82,0.25);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 13px;
      color: var(--red);
      font-family: 'JetBrains Mono', monospace;
      animation: floatUp 0.3s ease forwards;
    }

    .success-box {
      background: rgba(0,230,118,0.05);
      border: 1px solid rgba(0,230,118,0.2);
      border-radius: 10px;
      padding: 16px;
      animation: floatUp 0.3s ease forwards;
    }
    .success-box-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--green);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .success-box-text {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.6;
    }
    .explorer-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      text-decoration: none;
      border-bottom: 1px dashed rgba(0,212,255,0.4);
      transition: all 0.2s;
      margin-top: 8px;
    }
    .explorer-link:hover { color: #7dd3fc; border-color: #7dd3fc; }

    /* ─── Footer ─── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
    }
    .footer-text {
      font-size: 12px;

// ─────────────────────────────────────────────
// Crypto helpers (SubtleCrypto + fallback)
// ─────────────────────────────────────────────

async function sha256hex(str) {
  try {
    const buf = new TextEncoder().encode(str);
    const hash = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
  } catch(e) {
    // Fallback: simple djb2-style deterministic hex (for http:// contexts)
    let h = 0xdeadbeef;
    for (let i = 0; i < str.length; i++) {
      h = Math.imul(h ^ str.charCodeAt(i), 0x9e3779b9);
      h = (h ^ (h >>> 16)) >>> 0;
    }
    // expand to 64 char by repeating pattern
    const base = (h >>> 0).toString(16).padStart(8, '0');
    const ext = Array.from({length: 7}, (_, i) => {
      let v = h ^ (i * 0x1f2f3f4f);
      v = Math.imul(v, 0x9e3779b9) >>> 0;
      return v.toString(16).padStart(8,'0');
    }).join('');
    return (base + ext).slice(0, 64);
  }
}

function randomHex(bytes) {
  const arr = new Uint8Array(bytes);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(b => b.toString(16).padStart(2,'0')).join('');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function fmtTime(d) {
  return d.toISOString().substr(11,12);
}

function truncAddr(addr) {
  return addr.slice(0,8) + '...' + addr.slice(-6);
}

const API_KEY    = 'privchain-demo-hackathon-2026';
const BUYER_ADDR = 'CEmG1JtpBfPLJqS7HksHVZ5wGsKp2xLKvcyXsaL1d2wE';
const SELLER_ADDR = 'BGzpdCEXXLMv4CaxGoRmxniABGMJoRVLcL8xEcigiPy3';

// StatusBadge

function StatusBadge({ status }) {

    'Paying':    { cls: 'badge-active',    dot: '●' },

  };
  const { cls, dot } = map[status] || map['Idle'];
  return (
    <span className={`status-badge ${cls}`}>
      <span>{dot}</span> {status}
    </span>
  );
}

// ─────────────────────────────────────────────
// AgentCard
// ─────────────────────────────────────────────
function AgentCard({ side, status }) {

        </div>

        </div>

}

// ─────────────────────────────────────────────
// FlowColumn
// ─────────────────────────────────────────────
function FlowColumn({ currentStep }) {
  const icons = ['🔐','📡','✅','💸','🔗','📦','🎉'];
  const n = icons.length;

  return (
    <div className="flow-col">
      <div className="flow-header">
        <h3>Payment Flow</h3>
      </div>

      <div className="privchain-badge">
        <div className="pb-title">⛓ PrivChain</div>
        <div className="pb-sub">Facilitator Node</div>
      </div>

      <div className="flow-pipe">
        {icons.map((icon, i) => (
          <React.Fragment key={i}>
            <div className={`flow-node ${i < currentStep ? 'done' : ''} ${i === currentStep ? 'current' : ''}`}>
              {icon}
            </div>
            {i < n - 1 && (
              <div className={`flow-line ${i < currentStep ? 'lit' : ''}`}></div>
            )}
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// StepItem
// ─────────────────────────────────────────────
function StepItem({ step, index, currentStep, stepData }) {
  const state =
    index < currentStep ? 'visible' :
    index === currentStep ? 'visible current-step' :
    'pending';

  const isVisible = index <= currentStep;
  const isCurrent = index === currentStep;

  const data = stepData[index] || {};

  return (
    <div className={`step-item ${state}`} style={{ animationDelay: isVisible ? '0ms' : undefined }}>
      <div className="step-icon-wrap">{step.emoji}</div>
      <div className="step-body">
        <div className="step-title">
          {step.label}
          {isCurrent && <span className="step-spinner"></span>}
        </div>
        {isVisible && data.hash && (
          <div>
            <span className="step-hash">{data.hash}</span>
          </div>
        )}
        {isVisible && data.link && (
          <div style={{marginTop:4}}>
            <a className="step-link" href={data.link} target="_blank" rel="noopener noreferrer">
              ↗ {data.linkLabel || data.link}
            </a>
          </div>
        )}
        {isVisible && data.note && (
          <div className="step-meta" style={{marginTop:4, color:'var(--text2)'}}>{data.note}</div>
        )}
        {isVisible && data.time && (
          <div className="step-meta" style={{marginTop:2}}>{data.time}</div>
        )}
      </div>
      {isVisible && data.ts && (
        <div className="step-time">{fmtTime(data.ts)}</div>
      )}
    </div>
  );
}

// Main App

        hash: `nullifier: ${nullifier.slice(0,16)}…`,
        note: `commitment: ${commitment.slice(0,16)}…`,
        ts: ts0,
        time: 'ZK proof generated locally',

      await sleep(600);

      // ── Step 1: POST /verify ──
      setCurrentStep(1);
      const expiry = Math.floor(Date.now() / 1000) + 3600;
      const verifyPayload = {
        scheme: 'priv-stark/v1',
        network: 'solana-devnet',
        nullifier,
        proof,
        commitment,
        amount: String(AMOUNT),
        recipient: SELLER_ADDR,
        protocol_version: 'priv-stark/v1',
        expiry,
      };

      let verifyRes = null, verifyRaw = null;
      try {
        const r = await fetch(`${API_BASE}/verify`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`,
          },
          body: JSON.stringify(verifyPayload),
          signal: AbortSignal.timeout(10000),
        });
        verifyRaw = await r.text();
        try { verifyRes = JSON.parse(verifyRaw); } catch(_) { verifyRes = { raw: verifyRaw }; }
      } catch(fetchErr) {
        verifyRes = { simulated: true, status: 'ok', message: 'Network unreachable — simulated response' };
      }

      const ts1 = new Date();
      setStepData(prev => ({...prev, 1: {
        hash: `POST /verify → ${verifyRes?.status || 'ok'}`,
        ts: ts1,
        time: `payload: ${JSON.stringify(verifyPayload).slice(0,60)}…`,
      }}));

      await sleep(500);

      // ── Step 2: Facilitator verifies ──
      setCurrentStep(2);
      await sleep(900);
      const ts2 = new Date();
      setStepData(prev => ({...prev, 2: {
        hash: `priv-stark/v1 ✓  proof verified`,
        note: verifyRes?.simulated ? '⚠ API offline — demo simulation mode' : (verifyRes?.message || 'Proof accepted'),
        ts: ts2,
      }}));

      await sleep(400);

      // ── Step 3: POST /settle ──
      setCurrentStep(3);
      const settlePayload = {
        scheme: 'priv-stark/v1',
        network: 'solana-devnet',
        nullifier,
        proof,
        commitment,
        amount: String(AMOUNT),
        recipient: SELLER_ADDR,
        protocol_version: 'priv-stark/v1',
        expiry,
      };

      let settleRes = null;
      try {
        const r = await fetch(`${API_BASE}/settle`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`,
          },
          body: JSON.stringify(settlePayload),
          signal: AbortSignal.timeout(10000),
        });
        const txt = await r.text();
        try { settleRes = JSON.parse(txt); } catch(_) { settleRes = { raw: txt }; }
      } catch(fetchErr) {
        // Simulate a plausible settlement ref
        settleRes = {
          simulated: true,
          settlement_ref: 'SIMULATED_NO_REAL_TX',
          tx_hash: randomHex(32),
          status: 'submitted',
        };
      }

      const settlementRef = settleRes?.settlement_ref || settleRes?.ref || ('solana_' + randomHex(16));
      const txHash        = settleRes?.tx_hash || settleRes?.tx || commitment.slice(0,64);
      const ts3 = new Date();

      setStepData(prev => ({...prev, 3: {
        hash: `ref: ${settlementRef}`,
        note: settleRes?.simulated ? '⚠ Simulated tx — API offline' : `tx: ${txHash.slice(0,16)}…`,
        ts: ts3,
      }}));

      await sleep(500);

      // ── Step 4: GET /settlements/:ref ──
      setCurrentStep(4);
      let settleFinal = null;
      try {
        const r = await fetch(`${API_BASE}/settlements/${settlementRef}`, {
          headers: { 'X-Api-Key': API_KEY },
          signal: AbortSignal.timeout(8000),
        });
        const txt = await r.text();
        try { settleFinal = JSON.parse(txt); } catch(_) { settleFinal = { raw: txt }; }
      } catch(fetchErr) {
        settleFinal = {
          simulated: true,
          settlement_ref: settlementRef,
          status: 'confirmed',
          block: Math.floor(Math.random() * 1000000) + 2000000,
        };
      }

      const explorerUrl = `https://explorer.solana.com/tx/${settlementRef}?cluster=devnet`;
      const ts4 = new Date();

      setStepData(prev => ({...prev, 4: {
        hash: `${settlementRef}`,
        link: explorerUrl,
        linkLabel: `View on Solana Explorer ↗`,
        note: `block: ${settleFinal?.block || 'confirmed'}`,
        ts: ts4,
      }}));

      // Save live data for the data cards
      setLiveData({
        nullifier,
        proof,
        commitment,
        settlementRef,
        txHash,
        explorerUrl,
        simulated: verifyRes?.simulated || settleRes?.simulated || false,
      });

      await sleep(600);

      // ── Step 5: Agent B delivers ──
      setCurrentStep(5);
      await sleep(700);
      const ts5 = new Date();
      setStepData(prev => ({...prev, 5: {
        note: 'EasyA Polkadot training data package delivered',
        hash: `proof: ${proof.slice(0,16)}…`,
        ts: ts5,
      }}));

      await sleep(500);

      // ── Step 6: Complete ──
      setCurrentStep(6);
      await sleep(500);
      const ts6 = new Date();
      setStepData(prev => ({...prev, 6: {
        note: 'Amount: hidden  |  Sender: hidden  |  Receiver: hidden',
        ts: ts6,
      }}));

      setRunning(false);
      setDone(true);

    } catch(err) {
      setError(err.message || 'Unknown error');
      setRunning(false);
    }
  }

  function reset() {
    setRunning(false);
    setDone(false);
    setCurrentStep(-1);
    setStepData({});
    setError(null);
    setLiveData(null);

  return (

        </p>

      {/* Stats */}

        <div className="stat">

      {/* Main Demo Grid */}

        <div className="demo-grid">
          <AgentCard side="buyer"  status={buyerStatus} />

          <AgentCard side="seller" status={sellerStatus} />

            <h2>// transaction_log</h2>
            <span className="step-count">
              {currentStep < 0 ? '0' : Math.min(currentStep + 1, 7)} / 7 steps
            </span>
          </div>

          <div className="progress-bar-wrap">
            <div

          {!running && !done && !error && (
