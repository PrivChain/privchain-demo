<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrivChain — Private Payments for AI Agents</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080c12;
      --surface:   #0d1420;
      --surface2:  #121b2a;
      --border:    #1e2d42;
      --border2:   #243347;
      --accent:    #00d4ff;
      --accent2:   #7c3aed;
      --green:     #00e676;
      --yellow:    #ffd740;
      --amber:     #ffa500;
      --red:       #ff5252;
      --muted:     #4a6080;
      --text:      #c8d8e8;
      --text2:     #8aa0b8;
      --glow:      0 0 20px rgba(0, 212, 255, 0.15);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    #root { position: relative; z-index: 1; }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ─── Animations ─── */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 8px rgba(0,212,255,0.2); }
      50%       { box-shadow: 0 0 24px rgba(0,212,255,0.5); }
    }
    @keyframes pulseGlowAmber {
      0%, 100% { box-shadow: 0 0 8px rgba(255,165,0,0.2); border-color: rgba(255,165,0,0.3); }
      50%       { box-shadow: 0 0 28px rgba(255,165,0,0.55); border-color: rgba(255,165,0,0.65); }
    }
    @keyframes pulseGlowApprove {
      0%, 100% { box-shadow: 0 0 20px rgba(0,212,255,0.4), 0 0 40px rgba(123,47,247,0.2); }
      50%       { box-shadow: 0 0 40px rgba(0,212,255,0.7), 0 0 70px rgba(123,47,247,0.4); }
    }
    @keyframes spinnerRing {
      to { transform: rotate(360deg); }
    }
    @keyframes scanline {
      0%   { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(6px) scale(0.96); }
      100% { opacity: 1; transform: translateY(0)  scale(1); }
    }
    @keyframes progressFill {
      from { width: 0%; }
      to   { width: 100%; }
    }
    @keyframes hexPulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }
    @keyframes approveFloat {
      0%   { opacity: 0; transform: translateY(18px) scale(0.94); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ─── Layout helpers ─── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ─── Header ─── */
    .header {
      border-bottom: 1px solid var(--border);
      background: rgba(8,12,18,0.9);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 16px rgba(0,212,255,0.3);
    }
    .logo-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .tagline {
      font-size: 13px;
      color: var(--text2);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.5px;
    }
    .header-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,212,255,0.06);
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
    }
    .dot-live {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 1.4s ease-in-out infinite;
    }

    /* ─── Hero ─── */
    .hero {
      text-align: center;
      padding: 60px 24px 40px;
    }
    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      color: #a78bfa;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
    }
    .hero h1 {
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 16px;
      letter-spacing: -1px;
    }
    .hero h1 span {
      background: linear-gradient(90deg, var(--accent) 0%, #a78bfa 50%, var(--accent) 100%);
      background-size: 200% auto;
      animation: shimmer 4s linear infinite;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero-sub {
      font-size: 17px;
      color: var(--text2);
      max-width: 560px;
      margin: 0 auto 40px;
      line-height: 1.6;
    }

    /* ─── Stats row ─── */
    .stats-row {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 56px;
      flex-wrap: wrap;
    }
    .stat {
      text-align: center;
    }
    .stat-val {
      font-size: 28px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
    }
    .stat-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    /* ─── Main demo grid ─── */
    .demo-grid {
      display: grid;
      grid-template-columns: 1fr 260px 1fr;
      gap: 20px;
      margin-bottom: 40px;
      align-items: start;
    }
    @media (max-width: 900px) {
      .demo-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ─── Agent Card ─── */
    .agent-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      transition: border-color 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }
    .agent-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.4s;
    }
    .agent-card.active::before { opacity: 1; }
    .agent-card.active {
      border-color: rgba(0,212,255,0.3);
      box-shadow: var(--glow);
      animation: pulseGlow 2s ease-in-out infinite;
    }
    .agent-card.seller-card::before {
      background: linear-gradient(90deg, transparent, var(--accent2), transparent);
    }
    .agent-card.seller-card.active {
      border-color: rgba(124,58,237,0.3);
      box-shadow: 0 0 20px rgba(124,58,237,0.15);
    }
    /* Amber pulse for awaiting-approval state */
    .agent-card.awaiting-approval {
      animation: pulseGlowAmber 1.8s ease-in-out infinite !important;
    }
    .agent-card.awaiting-approval::before {
      background: linear-gradient(90deg, transparent, var(--amber), transparent) !important;
      opacity: 1 !important;
    }

    .agent-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .agent-avatar {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }
    .avatar-buyer {
      background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,212,255,0.05));
      border: 1px solid rgba(0,212,255,0.2);
    }
    .avatar-seller {
      background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(124,58,237,0.05));
      border: 1px solid rgba(124,58,237,0.2);
    }

    .agent-title {
      font-size: 16px;
      font-weight: 600;
      color: #e2eaf4;
      margin-bottom: 3px;
    }
    .agent-subtitle {
      font-size: 12px;
      color: var(--text2);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.3px;
      transition: all 0.3s;
    }
    .badge-idle {
      background: rgba(74,96,128,0.2);
      border: 1px solid rgba(74,96,128,0.4);
      color: var(--muted);
    }
    .badge-active {
      background: rgba(0,212,255,0.1);
      border: 1px solid rgba(0,212,255,0.3);
      color: var(--accent);
    }
    .badge-complete {
      background: rgba(0,230,118,0.1);
      border: 1px solid rgba(0,230,118,0.3);
      color: var(--green);
    }
    .badge-waiting {
      background: rgba(255,215,64,0.08);
      border: 1px solid rgba(255,215,64,0.25);
      color: var(--yellow);
    }
    .badge-verifying {
      background: rgba(124,58,237,0.12);
      border: 1px solid rgba(124,58,237,0.35);
      color: #a78bfa;
    }
    .badge-paid {
      background: rgba(0,230,118,0.1);
      border: 1px solid rgba(0,230,118,0.3);
      color: var(--green);
    }
    .badge-reviewing {
      background: rgba(255,165,0,0.12);
      border: 1px solid rgba(255,165,0,0.4);
      color: var(--amber);
    }
    .badge-awaiting {
      background: rgba(255,165,0,0.08);
      border: 1px solid rgba(255,165,0,0.3);
      color: #ffb74d;
    }

    .agent-fields {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .field-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: 'JetBrains Mono', monospace;
    }
    .field-value {
      font-size: 13px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
    }
    .field-value.accent { color: var(--accent); font-weight: 600; }
    .field-value.accent2 { color: #a78bfa; font-weight: 600; }
    .field-value.large {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .wallet-addr {
      font-size: 11px;
      color: var(--text2);
      font-family: 'JetBrains Mono', monospace;
      word-break: break-all;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
    }

    /* ─── Flow Column ─── */
    .flow-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .flow-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .flow-header h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: 'JetBrains Mono', monospace;
    }

    .flow-pipe {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      gap: 0;
    }

    .flow-node {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--border2);
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      position: relative;
      transition: all 0.4s;
      flex-shrink: 0;
    }
    .flow-node.done {
      border-color: var(--accent);
      background: rgba(0,212,255,0.08);
      box-shadow: 0 0 12px rgba(0,212,255,0.3);
    }
    .flow-node.current {
      border-color: var(--accent);
      animation: pulseGlow 1.2s ease-in-out infinite;
    }
    .flow-node.pause {
      border-color: var(--amber);
      background: rgba(255,165,0,0.1);
      box-shadow: 0 0 12px rgba(255,165,0,0.35);
    }

    .flow-line {
      width: 2px;
      height: 20px;
      background: var(--border);
      transition: background 0.4s;
      flex-shrink: 0;
    }
    .flow-line.lit {
      background: linear-gradient(180deg, var(--accent), rgba(0,212,255,0.3));
    }

    .privchain-badge {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 12px 16px;
      text-align: center;
      margin: 12px 0;
      width: 100%;
    }
    .privchain-badge .pb-title {
      font-size: 11px;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .privchain-badge .pb-sub {
      font-size: 10px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ─── Approve Gate ─── */
    .approve-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin: 20px 0;
      animation: approveFloat 0.5s cubic-bezier(0.4,0,0.2,1) forwards;
      width: 100%;
    }
    .approve-gate-label {
      font-size: 11px;
      color: var(--amber);
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
    }
    .approve-btn {
      background: linear-gradient(135deg, #00d4ff, #7b2ff7);
      color: #fff;
      font-weight: 700;
      font-size: 18px;
      padding: 16px 48px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(0,212,255,0.5);
      animation: pulseGlowApprove 1.6s ease-in-out infinite;
      font-family: 'Inter', sans-serif;
      letter-spacing: -0.2px;
      transition: transform 0.15s, opacity 0.15s;
      width: 100%;
    }
    .approve-btn:hover {
      transform: translateY(-2px) scale(1.02);
    }
    .approve-btn:active {
      transform: translateY(0) scale(0.99);
    }
    .approve-gate-sub {
      font-size: 11px;
      color: var(--text2);
      font-family: 'JetBrains Mono', monospace;
      text-align: center;
      line-height: 1.5;
      padding: 0 8px;
    }
    .reject-btn {
      background: transparent;
      color: #ff4444;
      border: 1px solid #ff4444;
      padding: 8px 24px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .reject-btn:hover { opacity: 1; }

    /* ─── Timeline ─── */
    .timeline-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 32px;
    }
    .timeline-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .timeline-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
    }
    .step-count {
      font-size: 12px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .progress-bar-wrap {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }

    .timeline-steps {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .step-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(30,45,66,0.5);
      opacity: 0;
      animation: none;
      position: relative;
    }
    .step-item:last-child { border-bottom: none; }
    .step-item.visible {
      animation: fadeSlideIn 0.45s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    .step-item.pending { opacity: 0.25; }

    .step-icon-wrap {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border2);
      transition: all 0.3s;
    }
    .step-item.visible .step-icon-wrap {
      background: rgba(0,212,255,0.06);
      border-color: rgba(0,212,255,0.2);
    }
    .step-item.current-step .step-icon-wrap {
      animation: pulseGlow 1.2s ease-in-out infinite;
    }
    .step-item.pause-step .step-icon-wrap {
      background: rgba(255,165,0,0.08);
      border-color: rgba(255,165,0,0.35);
      animation: pulseGlowAmber 1.8s ease-in-out infinite;
    }

    .step-body { flex: 1; min-width: 0; }
    .step-title {
      font-size: 14px;
      font-weight: 500;
      color: #e2eaf4;
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .step-meta {
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .step-hash {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      background: rgba(0,212,255,0.05);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 4px;
      padding: 2px 6px;
      display: inline-block;
      margin-top: 4px;
      word-break: break-all;
    }
    .step-link {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px dashed rgba(0,212,255,0.4);
      transition: color 0.2s, border-color 0.2s;
    }
    .step-link:hover {
      color: #7dd3fc;
      border-color: #7dd3fc;
    }

    .step-time {
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .step-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0,212,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spinnerRing 0.8s linear infinite;
      display: inline-block;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* ─── Live Data Section ─── */
    .live-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 32px;
    }
    .live-section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .live-section-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }
    .live-section-header .live-tag {
      background: rgba(0,230,118,0.1);
      border: 1px solid rgba(0,230,118,0.3);
      color: var(--green);
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .try-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--accent), #38bdf8);
      color: #000;

// Crypto helpers (SubtleCrypto + fallback)
// ─────────────────────────────────────────────

async function sha256hex(str) {
  try {
    const buf = new TextEncoder().encode(str);
    const hash = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
  } catch(e) {
    let h = 0xdeadbeef;
    for (let i = 0; i < str.length; i++) {
      h = Math.imul(h ^ str.charCodeAt(i), 0x9e3779b9);
      h = (h ^ (h >>> 16)) >>> 0;
    }
    const base = (h >>> 0).toString(16).padStart(8, '0');
    const ext = Array.from({length: 7}, (_, i) => {
      let v = h ^ (i * 0x1f2f3f4f);
      v = Math.imul(v, 0x9e3779b9) >>> 0;
      return v.toString(16).padStart(8,'0');
    }).join('');
    return (base + ext).slice(0, 64);
  }
}

function randomHex(bytes) {
  const arr = new Uint8Array(bytes);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(b => b.toString(16).padStart(2,'0')).join('');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function fmtTime(d) {

  const [running, setRunning]               = React.useState(false);

  const [stepData, setStepData]             = React.useState({});

  const [liveData, setLiveData]             = React.useState(null);
  const [awaitingApproval, setAwaitingApproval] = React.useState(false);

  // Ref to trigger post-approval continuation
  const approveResolveRef = React.useRef(null);

  // ── Derived agent statuses ──
  // Buyer (Agent A): Idle → Locking → Reviewing → Approved → Complete
  // Seller (Agent B): Waiting → Committed → Delivered → Awaiting Approval → Paid
  const buyerStatus = !running && !done ? 'Idle'
    : done ? 'Complete'
    : awaitingApproval ? 'Reviewing'
    : currentStep >= 6 ? 'Approved'
    : currentStep >= 2 ? 'Locking'
    : 'Idle';

  const sellerStatus = !running && !done ? 'Waiting'
    : done ? 'Paid'
    : awaitingApproval ? 'Awaiting Approval'
    : currentStep >= 8 ? 'Paid'
    : currentStep >= 4 ? 'Delivered'
    : currentStep >= 1 ? 'Committed'
    : 'Waiting';

  // Progress: step 5 (pause) → ~65%, full at step 8
  // We map steps 0-8 to 0-100%
  // At step 5 pause, peg at 65
  const scenarioSteps = scenario==='dispute' ? 10 : scenario==='impossible' ? 8 : TOTAL_STEPS;
  const progressPct = currentStep < 0 ? 0

                <div className="data-card">
                  <div className="data-card-label">Deliverable Commitment (Agent B)</div>
                  <div className="data-card-value">{liveData.commitmentB}</div>
                </div>
                <div className="data-card">
                  <div className="data-card-label">Secret Nonce</div>
                  <div className="data-card-value">{liveData.nonce}</div>
                </div>
                <div className="data-card">
                  <div className="data-card-label">Nullifier (Agent A)</div>
                  <div className="data-card-value">{liveData.nullifier}</div>
                </div>
                <div className="data-card">
                  <div className="data-card-label">ZK Proof (sha256)</div>
                  <div className="data-card-value">{liveData.proof}</div>
                </div>
                <div className="data-card">
                  <div className="data-card-label">Payment Commitment Hash</div>
                  <div className="data-card-value">{liveData.commitment}</div>
                </div>
                <div className="data-card">
                  <div className="data-card-label">Approval Signature (ed25519)</div>
                  <div className="data-card-value">0x{liveData.approvalSig}</div>
                </div>
                <div className="data-card">
                  <div className="data-card-label">Settlement Ref (canonical tx)</div>
                  <div className="data-card-value">{liveData.settlementRef}</div>
                </div>
                {liveData.splits && liveData.splits.length > 0 && (
                  <div className="data-card" style={{border:'1px solid rgba(0,212,255,0.25)', background:'rgba(0,212,255,0.03)'}}>
                    <div className="data-card-label">🌊 Privacy Mode: {liveData.privacyMode || 'denomination_mixing'}</div>
                    <div className="data-card-value" style={{color:'var(--green)'}}>
                      {AMOUNT} PRIV → [{liveData.splits.map(s=>s.amount).join(', ')}]
                    </div>
                    <div style={{fontSize:11, fontFamily:"'JetBrains Mono',monospace", color:'var(--text2)', marginTop:4}}>
                      {liveData.splits.length} on-chain transaction{liveData.splits.length!==1?'s':''} — total never visible as single figure
                    </div>
                  </div>
                )}
              </div>

              {done && (
                <div className="success-box">
                  <div className="success-box-title">🎉 Transaction Complete</div>
                  <div className="success-box-text">
                    750 PRIV settled on Solana Devnet via PrivChain (priv-stark/v1).
                    Agent A committed payment before delivery, Agent B committed deliverable before payment — 
                    then Agent A verified and approved before settlement fired.
                    {liveData.splits && liveData.splits.length > 1 && (
                      <span style={{display:'block', marginTop:6, color:'var(--accent)'}}>
                        Payment split into standard denominations ({liveData.splits.map(s=>s.amount).join(' + ')} PRIV) — each transaction is indistinguishable from thousands of routine transfers. The settlement total never appears as a single on-chain figure.
                      </span>
                    )}
                    {' '}Amount, sender, and recipient remain cryptographically private.
                    {liveData.simulated && (
                      <span style={{color:'var(--yellow)', display:'block', marginTop:6}}>
                        ⚠ API endpoint offline — demo ran in simulation mode with real ZK-style crypto.
                      </span>
                    )}
                  </div>
                  <a className="explorer-link" href={liveData.explorerUrl} target="_blank" rel="noopener noreferrer">
                    ↗ View canonical settlement tx on Solana Explorer
                  </a>
                </div>
              )}
            </>
          )}

          {!running && !done && !error && (
            <div style={{
              background:'var(--surface2)',
              border:'1px dashed var(--border2)',
              borderRadius:10,
              padding:'20px 24px',
              textAlign:'center',
              color:'var(--muted)',
              fontSize:13,
              fontFamily:"'JetBrains Mono', monospace",
            }}>
              Press "Try It Live" to run the PrivChain commitment-reveal demo.
              <br/>
              <span style={{fontSize:11, opacity:0.7}}>
                Agent B commits deliverable hash → Agent A locks payment → delivery → Agent A approves → settlement fires.
              </span>
            </div>
          )}
        </div>

        {/* How it works */}
        <div style={{
          display:'grid',
          gridTemplateColumns:'repeat(auto-fill, minmax(260px, 1fr))',
          gap:16,
          marginBottom:32,
        }}>
          {[
            { icon:'🔒', title:'Commitment-Reveal Gate', desc:'Agent B commits to their deliverable hash before work begins. Agent A commits payment. Neither can change their side without invalidating the contract.' },
            { icon:'✅', title:'Agent A Must Approve', desc:'Payment doesn\'t fire automatically. Agent A reviews the deliverable, verifies the hash matches, then explicitly approves. This is not just escrow — it\'s programmable conditional release.' },
            { icon:'🔐', title:'ZK Commitments + Denomination Mixing', desc:'Each payment generates a unique nullifier and ZK commitment. Combined with denomination mixing, the settlement total never appears on-chain — it\'s split across standard-sized transfers indistinguishable from routine activity.' },
            { icon:'🌊', title:'Denomination Mixing', desc:'Payments are split into standard denominations (e.g. 750 PRIV → 500 + 250) and routed with timing jitter between each transfer. The amount is hidden in plain sight — any single transaction looks like any other.' },
            { icon:'🌐', title:'Solana Settlement', desc:'Final settlement is anchored on Solana for speed and cost. On-chain data contains no identifying information.' },
          ].map((item,i) => (
            <div key={i} style={{
              background:'var(--surface)',
              border:'1px solid var(--border)',
              borderRadius:12,
              padding:'20px 22px',
            }}>
              <div style={{fontSize:28, marginBottom:10}}>{item.icon}</div>
              <div style={{fontSize:14, fontWeight:600, color:'var(--text)', marginBottom:6}}>{item.title}</div>
              <div style={{fontSize:13, color:'var(--text2)', lineHeight:1.6}}>{item.desc}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Q&A Section */}
      <div className="container" style={{marginBottom:40}}>
        <div style={{marginBottom:24}}>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:18,fontWeight:700,color:'var(--text)',marginBottom:6}}>
            // common_questions
          </div>
          <div style={{fontSize:13,color:'var(--text2)'}}>Hard questions answered honestly</div>
        </div>
        <QnA />
      </div>

      {/* Footer */}
      <footer className="footer">
        <p className="footer-text">
          Powered by <span>PrivChain</span> &nbsp;|&nbsp; <span>priv-stark/v1</span> &nbsp;|&nbsp; Built for the autonomous AI economy
        </p>
        <p className="footer-text" style={{marginTop:6, opacity:0.5}}>
          Facilitator: {API_BASE}
        </p>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
</html>
